<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magicbox P2P Browser Gateway</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card: #111827;
      --border: #1f2937;
      --text: #f9fafb;
      --text-mute: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .setup-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 20px;
    }

    .setup-card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 440px;
      padding: 32px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: 600;
    }

    p {
      color: var(--text-mute);
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: var(--text-mute);
    }

    input {
      width: 100%;
      background-color: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: var(--accent-hover);
    }

    .status-box {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .status-connecting {
      background-color: rgba(59, 130, 246, 0.1);
      color: var(--accent);
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .status-success {
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-error {
      background-color: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Tunnel viewport iframe */
    #tunnel-frame {
      display: none;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="setup-view" class="setup-container">
    <div class="setup-card">
      <h2>P2P Gateway</h2>
      <p>Connect securely to your home Magicbox over a private peer-to-peer web tunnel.</p>

      <form id="setup-form">
        <div class="form-group">
          <label for="connection-code">Connection Code</label>
          <input type="text" id="connection-code" placeholder="Paste connection code here" required>
        </div>

        <details style="margin-bottom: 20px; font-size: 13px; color: var(--text-mute);">
          <summary style="cursor: pointer; margin-bottom: 10px;">Advanced / Manual Config</summary>
          <div style="padding: 10px; border-left: 2px solid var(--border); margin-bottom: 10px;">
            <div class="form-group">
              <label for="relay-url">P2P Relay WebSocket URL</label>
              <input type="text" id="relay-url" placeholder="e.g. wss://relay.yourdomain.com">
            </div>

            <div class="form-group">
              <label for="peer-id">Home Magicbox Peer ID</label>
              <input type="text" id="peer-id" placeholder="e.g. 12D3KooW...">
            </div>

            <div class="form-group" style="margin-bottom: 0;">
              <label for="pairing-code">Pairing Code (OTP)</label>
              <input type="text" id="pairing-code" placeholder="Enter 6-digit code">
            </div>
          </div>
        </details>

        <button type="submit" class="btn">Establish P2P Tunnel</button>
      </form>

      <div id="status-message" class="status-box"></div>
    </div>
  </div>

  <iframe id="tunnel-frame" src="about:blank"></iframe>

  <script type="importmap">
      {
        "imports": {
          "libp2p": "https://cdn.jsdelivr.net/npm/libp2p@latest/+esm",
          "@libp2p/websockets": "https://cdn.jsdelivr.net/npm/@libp2p/websockets@latest/+esm",
          "@chainsafe/libp2p-noise": "https://cdn.jsdelivr.net/npm/@chainsafe/libp2p-noise@latest/+esm",
          "@chainsafe/libp2p-yamux": "https://cdn.jsdelivr.net/npm/@chainsafe/libp2p-yamux@latest/+esm",
          "@libp2p/circuit-relay-v2": "https://cdn.jsdelivr.net/npm/@libp2p/circuit-relay-v2@latest/+esm",
          "@libp2p/identify": "https://cdn.jsdelivr.net/npm/@libp2p/identify@latest/+esm",
          "@multiformats/multiaddr": "https://cdn.jsdelivr.net/npm/@multiformats/multiaddr@latest/+esm",
          "@libp2p/peer-id": "https://cdn.jsdelivr.net/npm/@libp2p/peer-id@latest/+esm",
          "@libp2p/webrtc": "https://cdn.jsdelivr.net/npm/@libp2p/webrtc@latest/+esm",
          "@libp2p/dcutr": "https://cdn.jsdelivr.net/npm/@libp2p/dcutr@latest/+esm"
        }
      }
      </script>
  <script src="main.js" type="module"></script>
</body>
</html>
