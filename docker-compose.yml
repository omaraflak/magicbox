services:
  magicbox-core:
    build: .
    image: magicbox/core:latest
    container_name: magicbox_core
    restart: unless-stopped
    networks:
      - magicbox_net
    ports:
      - "8081:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${MAGICBOX_HOST_ROOT:-/opt/magicbox}:/opt/magicbox
    environment:
      - MAGICBOX_HOST_ROOT=${MAGICBOX_HOST_ROOT:-/opt/magicbox}
      - MAGICBOX_PORT=80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.entrypoints=web"
      - "traefik.http.routers.core.rule=PathPrefix(`/`)"
      - "traefik.http.services.core.loadbalancer.server.port=80"

networks:
  magicbox_net:
    name: magicbox_net
    driver: bridge
